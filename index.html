<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spotify Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
  <div class="container-fluid">
    <div class="row">
        <!--COL: LEFT -->
        <!-- <div class="sidebar-left col-12 fixed-bottom position-md-static col-md-3 order-md-1 bg-danger">left</div> -->
        <!-- bottom-navbar in mobile view che sparisce in md view -->
        <div class="sidebar-left col-12 fixed-bottom d-md-none bg-danger">left</div>
        <!-- col che appare da md a sx -->
        <div class="sidebar-left d-none d-md-block col-md-4 col-lg-3 order-md-1 bg-danger">left</div>

        <!-- COL: MAIN-CONTENT -->
        <div class="main-content col-12 col-md-8 col-lg-7 order-1 order-md-2 bg-secondary">main</div>

        <!--COL: ATTIVITÀ AMICI -->
        <!-- d-none di default, appare solo in lg view -->
        <div class="sidebar-right d-none d-lg-block col-lg-2 order-lg-3 bg-info">right</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
