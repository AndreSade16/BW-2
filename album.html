<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify - Album</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/album.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-dark text-light">
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col mx-lg-4">
          <div
            id="topbar"
            class="d-flex justify-content-between align-items-center mt-3 position-sticky top-0 start-0 end-0"
          >
            <div id="forward-backwards-btn-group">
              <i
                class="fas fa-chevron-circle-left fs-2 btn bg-dark text-light d-none d-lg-inline-block"
              ></i>
              <i
                class="fas fa-chevron-circle-right fs-2 btn bg-dark text-light d-none d-lg-inline-block"
              ></i>
              <a href="#"
                ><i
                  class="fas fa-arrow-left fs-2 btn bg-dark text-light d-lg-none"
                ></i
              ></a>
            </div>
            <div id="user-dropdown" class="dropdown d-none d-lg-block">
              <a
                class="btn btn-secondary dropdown-toggle bg-dark d-flex align-items-center gap-2 p-0 pe-2 border-0 rounded-4"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <img
                  src="./assets/imgs/main/image-1.jpg"
                  alt="user-pic"
                  style="width: 2rem"
                  class="rounded-circle"
                />
                Username...
              </a>

              <ul class="dropdown-menu dropdown-menu-end bg-dark">
                <li><a class="dropdown-item text-light" href="#">Action</a></li>
                <li>
                  <a class="dropdown-item text-light" href="#"
                    >Another action</a
                  >
                </li>
                <li>
                  <a class="dropdown-item text-light" href="#"
                    >Something else here</a
                  >
                </li>
              </ul>
            </div>
          </div>
          <div
            id="hero"
            class="position-relative d-flex flex-column flex-lg-row align-items-center justify-content-center"
          >
            <img
              id="album-cover"
              src="./assets/imgs/main/image-19.jpg"
              alt="album-cover"
              class="mt-3 me-3 shadow-lg"
              style="width: 300px"
            />
            <div
              id="hero-text"
              class="align-self-start align-self-lg-center mt-4 flex-lg-grow-1"
            >
              <h5
                id="hero-record-type"
                class="d-none d-lg-inline-block text-uppercase"
              >
                ALBUM
              </h5>
              <h2 id="album-title" class="h2 mb-lg-5">Gioventù Bruciata</h2>
              <div
                id="infos"
                class="mt-3 d-lg-flex align-items-center gap-3 gap-lg-1"
              >
                <div id="artist-info" class="d-flex align-items-center">
                  <img
                    id="artist-pic"
                    src="./assets/imgs/main/image-19.jpg"
                    alt=""
                    class="rounded-circle me-2"
                    style="width: 2rem"
                  />
                  <h4
                    id="artist-name"
                    class="d-flex align-items-center m-0 fs-6"
                  >
                    Pinguini Tattici Nucleari
                  </h4>
                </div>
                <div
                  id="album-info"
                  class="d-flex justify-content-start gap-1 text-secondary mt-2 mt-lg-0"
                >
                  <p id="record-type" class="m-lg-0 d-lg-none text-capitalize">
                    Album
                  </p>
                  <p class="m-lg-0">•</p>
                  <p id="hero-album-year" class="m-lg-0">2017</p>
                  <p class="m-lg-0 d-none d-lg-block">•</p>
                  <p id="hero-tracks-num" class="m-lg-0 d-none d-lg-block">
                    12 brani,
                  </p>
                  <p id="hero-length" class="m-lg-0 d-none d-lg-block">
                    53 min, 20 sec
                  </p>
                </div>
              </div>
            </div>
          </div>
          <!-- FUNCTIONALITY BAR -->
          <div
            id="functionality-wrapper"
            class="d-flex w-100 justify-content-between justify-content-lg-end mb-3 mt-3 flex-lg-row-reverse"
          >
            <div
              id="functionality-left"
              class="d-flex justify-content-start gap-4 gap-sm-5"
            >
              <i
                class="far fa-heart d-flex justify-content-center align-items-center fs-2"
                style="width: 2rem"
              ></i>
              <i
                class="fas fa-arrow-circle-down d-flex justify-content-center align-items-center fs-2"
                style="width: 2rem"
              ></i>
              <i
                class="fas fa-ellipsis-v d-flex justify-content-center align-items-center fs-2"
                style="width: 2rem"
              ></i>
            </div>
            <div
              id="functionality-right"
              class="d-flex justify-content-end gap-4 gap-sm-5"
            >
              <i
                class="fas fa-random d-flex justify-content-center align-items-center fs-2 d-lg-none"
                style="width: 2rem"
              ></i>
              <div
                class="p-4 d-flex justify-content-center align-items-center bg-success rounded-circle fs-2 me-lg-5"
              >
                <i class="fas fa-play text-black"></i>
              </div>
            </div>
          </div>
          <!-- TRACKS SECTION -->
          <section id="tracks-section" class="mt-3">
            <div id="tracks-space" class="container-fluid">
              <div
                class="row d-none d-lg-flex border-bottom border-1 text-secondary"
              >
                <div class="col-1">
                  <p class="text-end">#</p>
                </div>
                <div class="col-5">
                  <p>TITOLO</p>
                </div>
                <div class="col-4">
                  <p>RIPRODUZIONI</p>
                </div>
                <div class="col-2 text-end">
                  <i class="far fa-clock"></i>
                </div>
              </div>
            </div>
          </section>
          <div id="lenght-info" class="d-flex gap-1 mt-3 d-lg-none">
            <p id="tracks-qty-mobile">1 brano</p>
            <p class="dot">•</p>
            <p id="album-length-mins-mobile">4 min</p>
          </div>
          <div
            id="publishing-info"
            class="d-flex flex-column flex-lg-row gap-1 gap-lg-3 mt-2"
          >
            <p id="copyright" class="m-0">© copyright</p>
            <p id="phonogram" class="m-0">℗ phonogram</p>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="album.js"></script>
  </body>
</html>
